    <main class="content">

        <div class="card">

            <h2>Lista de clientes</h2>

            <input type="text" id="buscar" placeholder="Buscar cliente...">

            <button class="btn" id="btnAbrir">Crear cliente</button>

            <table id="tablaClientes">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                    </tr>
                </thead>

                <tbody id="bodyClientes">
                    <tr>
                        <td>1</td>
                        <td>Camila López</td>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">

        <h3>Datos del cliente</h3>

        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="text" id="telefono" placeholder="Teléfono" required pattern="[0-9]{8}" maxlength="8" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')" title="El teléfono debe contener exactamente 8 números">
        <input type="text" id="direccion" placeholder="Dirección" required>

        <button class="btn" id="guardar">Guardar</button>
        <button class="btn" id="cerrar">Cerrar</button>

    </div>
</div>
