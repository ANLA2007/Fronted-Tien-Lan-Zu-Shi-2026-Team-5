    <div class="main-content">

        

        <div class="container">

            <div class="card">
                <h2> Datos del Cliente</h2>

                <input type="text" placeholder="Nombre del cliente"><br>
                <input type="text" placeholder="Teléfono"><br>
                <input type="text" placeholder="Dirección">
            </div>

            <div class="card">
                <h2> Datos de la Venta</h2>

                <label>Vendedor:</label>
                <select>
                    <option>Mesero 1</option>
                    <option>Mesero 2</option>
                    <option>Mesero 3</option>
                    <option>Mesero 4</option>
                </select>

                <br><br>

                <label>Seleccionar platillos:</label>

                <select id="menuSelect" multiple onchange="agregarSeleccionados()">
                    <option value="Arroz Cantones|10"> Arroz Cantones - $10</option>
                    <option value="Arroz Chino|10"> Arroz Chino - $10</option>
                    <option value="Arroz Blanco|7"> Arroz Blanco - $7</option>
                    <option value="Fideos con Arroz|10"> Fideos con Arroz - $10</option>
                    <option value="Chao Mein|15"> Chao Mein - $15</option>
                    <option value="Porcion de Vegetales|8"> Porcion de Vegetales - $8</option>
                    <option value="Sopa de vegetales|8"> Sopa de vegetales - $8</option>
                    <option value="Tacos a la Plancha|12"> Tacos a la Plancha - $12</option>
                    <option value="Tacos Fritos|12"> Tacos Fritos - $12</option>
                    <option value="Tallarines|12"> Tallarines - $12</option>
                    <option value="Leche de soya con Jengibre|3"> Leche de soya con Jengibre - $3</option>
                    <option value="Te Caliente|6"> Te Caliente - $6</option>
                    <option value="Te de Limon|6"> Te de Limon - $6</option>
                    <option value="Te de Jamaica|6"> Te de Jamaica - $6</option>
                    <option value="Cafe con Leche|6"> Cafe con Leche - $6</option>
                    <option value="Cafe negro|6"> Cafe negro - $6</option>
                </select>

            </div>

            <div class="card">
                <h2> Detalle de Venta</h2>

                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Total</th>
                        </tr>
                    </thead>

                    <tbody id="detalle"></tbody>
                </table>

                <h3>Total a pagar: $<span id="total">0</span></h3>

                <button class="btn-primary">Guardar Venta</button>
                <button class="btn-danger">Cancelar</button>

            </div>

        </div>
