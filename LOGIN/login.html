<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login">

    <div class="caja">

        <div class="logo">
            <img src="img/logo.png" alt="Logo">
        </div>

        <form class="formulario" action="../DASHBOARD/dashboard.html">

            <h2>Bienvenido</h2>

            <div class="campo">
                <label>Usuario</label>
                <input type="text" required>
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" required>
            </div>

            <div class="opciones">
                <label>
                    <input type="checkbox">
                    Recordar
                </label>
                <span class="olvidaste">¿Olvidaste?</span>
            </div>

            <button type="submit">Iniciar sesión</button>

        </form>

    </div>

</div>

</body>
</html>
