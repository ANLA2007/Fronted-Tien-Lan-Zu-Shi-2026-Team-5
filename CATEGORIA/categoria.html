            <a href="../DASHBOARD/dashboard.html" class="nav-link">

    <div class="main-content">

        <div class="header-roles">

            <h1> Gestión de Categorías</h1>

            <button class="btn-roles" onclick="abrirModal()">
                + Nueva Categoría
            </button>

        </div>

        <table class="table-roles" id="tablaCategorias">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Nombre Categoría</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody>
            </tbody>

        </table>

    </div>

</div>

<!-- MODAL -->

<div id="modalCategoria" class="modal">

    <div class="modal-content">

        <h3>Nueva Categoría</h3>

        <input
            type="text"
            id="nombreCategoria"
            placeholder="Nombre de la categoría"
        >

        <p id="errorCategoria" class="error-text"></p>

        <select id="estadoCategoria">

            <option value="Activo">Activo</option>

            <option value="Inactivo">Inactivo</option>

        </select>

        <div class="modal-buttons">

            <button
                class="btn-roles"
                onclick="guardarCategoria()"
            >
                Guardar
            </button>

            <button
                class="btn-cancel"
                onclick="cerrarModal()"
            >
                Cancelar
            </button>

        </div>

    </div>

</div>

<script src="js/categorias.js" defer></script>
