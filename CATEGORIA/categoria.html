    <link rel="stylesheet" href="categorias.css">
</head>

<body class="categorias">

<header class="header">

    <div class="header-content">

        <div class="logo-negocio">
            <img src="img/logo.png" alt="">
            <span>Tien Lan Zhu Shi</span>
        </div>

        <div class="user-info">

            <div class="notif">
                🔔
                <span class="notif-badge">3</span>
            </div>

            <span>Admin</span>

            <div class="user-avatar">
                TL
            </div>

        </div>

    </div>

</header>

<div class="main-container">

    <aside class="sidebar">

        <nav class="nav">

            <a href="../PAGINA PRINCIPAL/pagprincipal.html" class="nav-link">
                <img src="img/home.png">
                <span>Inicio</span>
            </a>

            <a href="../DASHBOARD/dashboard.html" class="nav-link">
                <img src="img/grafico.png">
                <span>Dashboard</span>
            </a>

            <a href="../USUARIO/usuario.html" class="nav-link">
                <img src="img/usuario.png">
                <span>Usuarios</span>
            </a>

            <a href="../ROLES/roles.html" class="nav-link">
                <img src="img/usuario.png">
                <span>Roles</span>
            </a>

            <a href="../CLIENTE/Cliente.html" class="nav-link">
                <img src="img/usuario.png">
                <span>Clientes</span>
            </a>

            <a href="../CATEGORIA/categoria.html" class="nav-link active">
                <img src="img/usuario.png">
                <span>Categorías</span>
            </a>

            <a href="../PLATILLO/Porcion.html" class="nav-link">
                <img src="img/platillos.png">
                <span>Porción</span>
            </a>

            <a href="../VENTA/NuevaVenta.html" class="nav-link">
                <img src="img/venta.png">
                <span>Ventas</span>
            </a>

            <a href="../HISTORIAL VENTA/HistorialVentas.html" class="nav-link">
                <img src="img/historialventa.png">
                <span>Historial Venta</span>
            </a>

            <a href="../INVENTARIO/inventario.html" class="nav-link">
                <img src="img/inventario.png">
                <span>Inventario</span>
            </a>

            <a href="../CONFIGURACION/configuracion.html" class="nav-link">
                <img src="img/configuracion.png">
                <span>Configuración</span>
            </a>

            <a href="../LOGIN/login.html" class="nav-link">
                <img src="img/cerrarsesion.png">
                <span>Cerrar sesión</span>
            </a>

        </nav>

    </aside>

    <main class="main-content">

        <div class="categorias-container">

            <div class="header-categorias">

                <h2>Gestión de Categorías</h2>

                <div class="categorias-tools">

                    <input 
                        type="text" 
                        class="search-categoria" 
                        placeholder="Buscar categoría"
                    >

                    <button class="btn-import">
                        Importar
                    </button>

                    <button 
                        class="btn-categoria" 
                        onclick="abrirModal()"
                    >
                        + Nueva Categoría
                    </button>

                </div>

            </div>

            <div class="table-responsive">

                <table class="table-categorias">

                    <thead>

                        <tr>
                            <th>Nombre Categoría</th>
                            <th>Estado</th>
                            <th>Descripción</th>
                            <th>Acciones</th>
                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<!-- MODAL -->

<div id="modalCategoria" class="modal">

    <div class="modal-content">

        <h3>Nueva Categoría</h3>

        <input
            type="text"
            id="nombreCategoria"
            placeholder="Nombre de la categoría"
        >

        <select id="estadoCategoria">

            <option value="Activo">
                Activo
            </option>

            <option value="Inactivo">
                Inactivo
            </option>

        </select>

        <input
            type="text"
            id="descripcionCategoria"
            placeholder="Descripción de la categoría"
        >

        <p id="errorCategoria" class="error-text"></p>

        <div class="modal-buttons">

            <button
                class="btn-categoria"
                onclick="guardarCategoria()"
            >
                Guardar
            </button>

            <button
                class="btn-cancel"
                onclick="cerrarModal()"
            >
                Cancelar
            </button>

        </div>

    </div>

</div>

<footer class="footer">
    <p>© 2026 Tien Lan Zhu Shi</p>
</footer>

<script src="js/categorias.js" defer></script>

</body>
</html>
