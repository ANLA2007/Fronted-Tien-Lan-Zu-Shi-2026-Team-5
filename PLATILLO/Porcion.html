<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platillos - Tien Lan Zhu Shi</title>

    <link rel="stylesheet" href="Porcion.css">
</head>

<body class="porcion">

    <header class="header">

        <div class="header-content">

            <div class="logo-negocio">
                <img src="img/logo.png" alt="">
                <span>Tien Lan Zhu Shi</span>
            </div>

            <div class="user-info">

                <div class="notif">
                    🔔
                    <span class="notif-badge">3</span>
                </div>

                <span>Admin</span>

                <div class="user-avatar">
                    TL
                </div>

            </div>

        </div>

    </header>

    <div class="main-container">

        <aside class="sidebar">

            <nav class="nav">

                <a href="../PAGINA PRINCIPAL/pagprincipal.html" class="nav-link">
                    <img src="img/home.png">
                    <span>Inicio</span>
                </a>

                <a href="../DASHBOARD/dashboard.html" class="nav-link">
                    <img src="img/grafico.png">
                    <span>Dashboard</span>
                </a>

                <a href="../USUARIO/usuario.html" class="nav-link">
                    <img src="img/usuario.png">
                    <span>Usuarios</span>
                </a>

                <a href="../ROLES/roles.html" class="nav-link">
                    <img src="img/usuario.png">
                    <span>Roles</span>
                </a>

                <a href="../CLIENTE/Cliente.html" class="nav-link">
                    <img src="img/usuario.png">
                    <span>Clientes</span>
                </a>

                <a href="../CATEGORIA/categoria.html" class="nav-link">
                    <img src="img/usuario.png">
                    <span>Categorías</span>
                </a>

                <a href="../PLATILLO/Porcion.html" class="nav-link active">
                    <img src="img/platillos.png">
                    <span>Porción</span>
                </a>

                <a href="../VENTA/NuevaVenta.html" class="nav-link">
                    <img src="img/venta.png">
                    <span>Ventas</span>
                </a>

                <a href="../HISTORIAL VENTA/HistorialVentas.html" class="nav-link">
                    <img src="img/historialventa.png">
                    <span>Historial Venta</span>
                </a>

                <a href="../INVENTARIO/inventario.html" class="nav-link">
                    <img src="img/inventario.png">
                    <span>Inventario</span>
                </a>

                <a href="../CONFIGURACION/configuracion.html" class="nav-link">
                    <img src="img/configuracion.png">
                    <span>Configuración</span>
                </a>

                <a href="../LOGIN/login.html" class="nav-link">
                    <img src="img/cerrarsesion.png">
                    <span>Cerrar sesión</span>
                </a>

            </nav>

        </aside>

        <main class="main-content">

            <div class="porcion-container">

                <div class="header-porcion">

                    <h2>Gestión de Platillos</h2>

                    <div class="porcion-tools">

                        <input 
                            type="text" 
                            class="search-porcion" 
                            placeholder="Buscar platillo"
                        >

                        <button class="btn-import">
                            Importar
                        </button>

                        <button 
                            class="btn-porcion" 
                            onclick="abrirModal()"
                        >
                            + Nuevo Platillo
                        </button>

                    </div>

                </div>

                <div class="table-responsive">

                    <table class="table-porcion">

                        <thead>

                            <tr>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio Porción</th>
                                <th>Descripción</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                        </tbody>

                    </table>

                </div>

            </div>

        </main>

    </div>

    <!-- MODAL -->

    <div id="modalPorcion" class="modal">

        <div class="modal-content">

            <h3>Nuevo Platillo</h3>

            <input 
                type="text"
                id="nombrePlatillo"
                placeholder="Nombre del platillo"
            >

            <input 
                type="text"
                id="categoriaPlatillo"
                placeholder="Nombre categoría"
            >

            <input 
                type="number"
                id="precioPlatillo"
                placeholder="Precio porción"
            >

            <input 
                type="text"
                id="descripcionPlatillo"
                placeholder="Descripción"
            >

            <p id="errorPlatillo" class="error-text"></p>

            <select id="estadoPlatillo">

                <option value="Activo">
                    Activo
                </option>

                <option value="Inactivo">
                    Inactivo
                </option>

            </select>

            <div class="modal-buttons">

                <button 
                    class="btn-porcion"
                    onclick="guardarPlatillo()"
                >
                    Guardar
                </button>

                <button 
                    class="btn-cancel"
                    onclick="cerrarModal()"
                >
                    Cancelar
                </button>

            </div>

        </div>

    </div>

    <footer class="footer">
        <p>© 2026 Tien Lan Zhu Shi</p>
    </footer>

    <script src="js/Porcion.js" defer></script>

</body>

</html>
