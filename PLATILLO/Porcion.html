    <div class="main-content">

        <div class="header-roles">

            <h2> Gestión de Platillos</h2>

            <button class="btn-roles" onclick="abrirModal()">
                + nuevo platillo
            </button>

        </div>

        <table class="table-roles" id="tablaPlatillos">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>categoria</th>
                    <th>Precio porcion</th>
                    <th>Descripcion</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>
            </tbody>

        </table>

    </div>

</div>

<div id="modal" class="modal">

    <div class="modal-content">

        <h3>Nuevo Platillo</h3>

        <input type="text" id="nombre" placeholder="Nombre del platillo">

         <input type="text" id="categoria" placeholder="Nombre Categoria">

        <input type="number" id="precioporcion" placeholder="Precio Porcion">

        <input type="text" id="descripcion" placeholder="Descripcion">

        <p id="error" class="error-text"></p>

        <select id="estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
        </select>

        <div class="modal-buttons">

            <button class="btn-roles" onclick="guardar()">
                Guardar
            </button>

            <button class="btn-cancel" onclick="cerrarModal()">
                Cancelar
            </button>

        </div>

    </div>

</div>
